<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test de Nivel de Estudio - Estilo Duolingo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Nunito', sans-serif;
            background-color: #131f24;
            color: #eeeeee;
        }
        .option-button {
            transition: all 0.2s ease;
            border-bottom-width: 4px;
        }
        .option-button:active {
            border-bottom-width: 0px;
            transform: translateY(2px);
        }
        .progress-bar-fill {
            transition: width 0.4s cubic-bezier(0.65, 0, 0.35, 1);
        }
        .character-bounce {
            animation: bounce 2s infinite;
        }
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-4">

    <!-- Progress Header -->
    <div class="fixed top-0 left-0 w-full p-6 flex items-center justify-center space-x-4 max-w-2xl mx-auto">
        <button id="back-btn" class="text-gray-500 hover:text-white hidden">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" />
            </svg>
        </button>
        <div class="flex-1 h-4 bg-[#37464f] rounded-full overflow-hidden">
            <div id="progress-bar" class="h-full bg-[#58cc02] progress-bar-fill" style="width: 20%"></div>
        </div>
        <div class="text-gray-500 font-bold">X</div>
    </div>

    <!-- Main Content Container -->
    <div id="app-container" class="w-full max-w-xl mt-12">
        <!-- Question Screen -->
        <div id="question-screen">
            <div class="flex items-start mb-8 space-x-4">
                <!-- Mascot (Simplified SVG inspired by the owl in image_97fa7a.png) -->
                <div class="character-bounce shrink-0 mt-4">
                    <svg width="80" height="80" viewBox="0 0 100 100">
                        <circle cx="50" cy="50" r="45" fill="#58cc02" />
                        <circle cx="35" cy="40" r="12" fill="white" />
                        <circle cx="65" cy="40" r="12" fill="white" />
                        <circle cx="35" cy="42" r="5" fill="black" />
                        <circle cx="65" cy="42" r="5" fill="black" />
                        <path d="M40 65 Q50 75 60 65" stroke="white" stroke-width="4" fill="none" />
                        <path d="M45 50 L55 50 L50 60 Z" fill="#ffc800" />
                    </svg>
                </div>
                
                <!-- Speech Bubble -->
                <div class="relative bg-transparent border-2 border-[#37464f] rounded-2xl p-4 ml-2">
                    <p id="question-text" class="text-xl font-bold text-white"></p>
                    <div class="absolute top-6 -left-2 w-4 h-4 bg-[#131f24] border-l-2 border-b-2 border-[#37464f] transform rotate-45"></div>
                </div>
            </div>

            <div id="options-container" class="space-y-3">
                <!-- Options will be injected here -->
            </div>
        </div>

        <!-- Result Screen -->
        <div id="result-screen" class="hidden text-center animate-fade-in">
             <div class="mb-6 flex justify-center">
                <svg width="120" height="120" viewBox="0 0 100 100">
                    <circle cx="50" cy="50" r="45" fill="#ffc800" />
                    <text x="50" y="65" font-size="40" text-anchor="middle" fill="white">🏆</text>
                </svg>
            </div>
            <h1 class="text-3xl font-extrabold text-[#58cc02] mb-4">¡Nivel Determinado!</h1>
            <p id="result-message" class="text-xl text-gray-300 mb-8"></p>
            
            <div class="space-y-4">
                <!-- Main redirect button to Google Sites -->
                <a href="https://sites.google.com/d/1nvw2KyE9KsBnz5LvYU0uZyFV9648Y5Cy/p/1fIQ4kYCAVRqIu5Kdk-PRg6VJuab5Y91w/edit" target="_blank" class="block w-full text-center bg-[#58cc02] border-b-4 border-[#46a302] text-white py-4 rounded-2xl font-extrabold text-lg uppercase tracking-wider option-button hover:bg-[#61e002] transition duration-200">
                    Continuar
                </a>
                
                <!-- Secondary button to restart test -->
                <button onclick="location.reload()" class="w-full bg-transparent border-2 border-[#37464f] hover:bg-[#202f36] text-[#afbbbe] py-3 rounded-2xl font-extrabold text-sm uppercase tracking-wider option-button transition duration-200">
                    Volver a empezar
                </button>
            </div>
        </div>
    </div>

    <script>
        const questions = [
            {
                id: 1,
                question: "¿Cuál es tu relación actual con la organización?",
                options: [
                    { text: "No uso agenda ni calendario, improviso cada día.", level: 1, bars: 1 },
                    { text: "A veces anoto cosas, pero las olvido pronto.", level: 2, bars: 2 },
                    { text: "Tengo un plan básico, pero me cuesta seguirlo.", level: 3, bars: 3 },
                    { text: "Tengo rutinas claras y cumplo mis objetivos.", level: 4, bars: 4 }
                ]
            },
            {
                id: 2,
                question: "¿Cómo manejas las distracciones al estudiar?",
                options: [
                    { text: "El móvil es mi mayor enemigo y me rindo fácil.", level: 1, bars: 1 },
                    { text: "Estudio con música o ruido, pero me distraigo.", level: 2, bars: 2 },
                    { text: "Uso técnicas (como Pomodoro) pero me canso.", level: 3, bars: 3 },
                    { text: "Entro en estado de 'flow' y me concentro bien.", level: 4, bars: 4 }
                ]
            },
            {
                id: 3,
                question: "¿Qué técnica de estudio utilizas más?",
                options: [
                    { text: "Solo leo y releo los textos varias veces.", level: 1, bars: 1 },
                    { text: "Subrayo todo el libro con colores.", level: 2, bars: 2 },
                    { text: "Hago resúmenes o esquemas propios.", level: 3, bars: 3 },
                    { text: "Uso autoevaluación y recuerdo activo (Active Recall).", level: 4, bars: 4 }
                ]
            }
        ];

        let currentStep = 0;
        let totalScore = 0;

        function renderQuestion() {
            const step = questions[currentStep];
            document.getElementById('question-text').innerText = step.question;
            const container = document.getElementById('options-container');
            container.innerHTML = '';

            step.options.forEach((opt, index) => {
                const btn = document.createElement('button');
                btn.className = "option-button w-full flex items-center p-4 rounded-2xl border-2 border-[#37464f] hover:bg-[#202f36] text-left group";
                
                // Signal Bars Icon logic
                let barsHtml = '<div class="flex items-end space-x-0.5 mr-4 h-6 w-8">';
                for(let i=1; i<=4; i++) {
                    const color = i <= opt.bars ? 'bg-[#1cb0f6]' : 'bg-[#37464f]';
                    const height = (i * 25) + '%';
                    barsHtml += `<div class="${color} w-1.5 rounded-sm" style="height: ${height}"></div>`;
                }
                barsHtml += '</div>';

                btn.innerHTML = `
                    ${barsHtml}
                    <span class="text-lg font-bold text-gray-300 group-hover:text-white">${opt.text}</span>
                `;
                
                btn.onclick = () => selectOption(opt.level);
                container.appendChild(btn);
            });

            const progress = ((currentStep + 1) / questions.length) * 100;
            document.getElementById('progress-bar').style.width = progress + '%';
        }

        function selectOption(level) {
            totalScore += level;
            currentStep++;

            if (currentStep < questions.length) {
                renderQuestion();
            } else {
                showResults();
            }
        }

        function showResults() {
            document.getElementById('question-screen').classList.add('hidden');
            document.getElementById('result-screen').classList.remove('hidden');
            document.getElementById('progress-bar').style.width = '100%';

            const average = totalScore / questions.length;
            let msg = "";

            if (average <= 1.5) {
                msg = "Estás en el nivel 'Principiante'. Te cuesta arrancar, pero con un método pequeño cada día verás grandes cambios.";
            } else if (average <= 2.5) {
                msg = "Estás en el nivel 'Intermedio Bajo'. Sabes que debes estudiar, pero la constancia es tu mayor reto.";
            } else if (average <= 3.5) {
                msg = "Estás en el nivel 'Avanzado'. Tienes buenas herramientas, solo falta pulir la eficiencia técnica.";
            } else {
                msg = "¡Eres un 'Maestro del Estudio'! Tu nivel de organización y enfoque es envidiable. ¡Sigue así!";
            }

            document.getElementById('result-message').innerText = msg;
        }

        // Initialize
        renderQuestion();
    </script>
</body>
</html>
